<!DOCTYPE html>
<html lang="id">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Berhasil | RHNX API</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        font-family: "Share Tech Mono", monospace;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        color: #0f172a;
      }

      .card {
        background: #ffffff;
        padding: 36px 28px;
        border-radius: 18px;
        width: 100%;
        max-width: 360px;
        text-align: center;
        animation: fadeIn 0.6s ease;
        box-shadow: 0 12px 32px rgba(14, 165, 233, 0.15);
        border: 1px solid #e0f2fe;
      }

      .check {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        margin: 0 auto 20px;
        position: relative;
        animation: pop 0.3s ease;
      }

      .check::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 34px;
        border-right: 5px solid #ffffff;
        border-bottom: 5px solid #ffffff;
        transform: rotate(45deg);
        left: 24px;
        top: 14px;
        animation: draw 0.3s ease forwards;
      }

      h1 {
        margin: 10px 0;
        font-size: 20px;
        font-weight: 600;
        color: #0369a1;
      }

      p {
        font-size: 14px;
        color: #475569;
        margin-bottom: 20px;
      }

      .loader {
        width: 100%;
        height: 5px;
        background: #e0f2fe;
        border-radius: 999px;
        overflow: hidden;
      }

      .loader span {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #38bdf8, #0ea5e9);
        animation: loading 3s linear forwards;
      }

      @keyframes pop {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }

      @keyframes draw {
        from {
          height: 0;
        }
        to {
          height: 34px;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes loading {
        to {
          width: 100%;
        }
      }

      @media (min-width: 640px) {
        .card {
          padding: 40px 32px;
        }

        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="check"></div>
      <h1>LOGIN SUCCESS</h1>
      <p>Redirecting to dashboard...</p>

      <div class="loader">
        <span></span>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const data = params.get("data");
      const token = params.get("token");

      if (!data || !token) {
        window.location.href = "/auth.html";
      }

      try {
        const user = JSON.parse(atob(data));
        localStorage.setItem("user", JSON.stringify(user));
        localStorage.setItem("token", token);

        setTimeout(() => {
          window.location.href = "/index.html";
        }, 3000);
      } catch (err) {
        console.error("Auth data rusak:", err);
        alert("Terjadi kesalahan saat login.");
        window.location.href = "/auth.html";
      }
    </script>
  </body>
</html>
